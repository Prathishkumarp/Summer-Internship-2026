<!DOCTYPE html>
<html>
<head>
    <title>Simple Landing Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color:rgba(117, 116, 118, 0.866);
            font-family:Arial, sans-serif;
        }

        nav{
            background-color:white;
            padding:15px;
        }

        nav ul{
            list-style:none;
            display:flex;
            justify-content:center;
        }

        nav ul li{
            margin:0 15px;
        }

        nav ul li a{
            text-decoration:none;
            color:black;
        }

        nav ul li a:hover{
            color:rgb(19, 58, 255);
        }

        .hero{
            text-align:center;
            padding:80px 20px;
            color:white;
        }

        .hero button{
            padding:10px;
            margin-top:10px;
            border:none;
            border-radius:10px;
        }

        .hero button:hover{
            background-color:white;
        }

        .features{
            display:flex;
            justify-content:center;
            padding:30px;
        }

        .box{
            border:1px solid black;
            padding:20px;
            margin:10px;
            width:200px;
            text-align:center;
            border-radius:20px;
            background-color:white;
        }

        .box:hover{
            border:1px solid rgb(255, 247, 0);
            transition:all 1s;
            box-shadow:7px 7px rgb(6, 6, 6);
            transform:translateY(-10px);
        }

        .features > .box h3{
            margin-bottom:10px;
        }

       footer{
            background-color:rgba(255, 255, 255, 0.823);
            text-align:center;
            padding:15px;
        }
        

        @media(max-width:600px){

            nav ul{
                flex-direction:column;
                text-align:center;
            }

            .features{
                flex-direction:column;
                align-items:center;
            }
        }

    </style>
</head>

<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>WELCOME TO MY WEBSITE</h1>
        <br>
        <p>This is a simple landing page created using HTML and CSS.</p>
        <button>Learn More</button>
    </section>

    <section class="features">

        <div class="box">
            <h3>Feature 1</h3>
            <p>Easy to use and simple for beginners.</p>
        </div>

        <div class="box">
            <h3>Feature 2</h3>
            <p>Responsive design for mobile and desktop.</p>
        </div>

        <div class="box">
            <h3>Feature 3</h3>
            <p>Clean layout with basic HTML and CSS.</p>
        </div>

    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
