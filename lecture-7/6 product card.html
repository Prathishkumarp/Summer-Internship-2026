<!DOCTYPE html>
<html>
<head>
    <title>PRODUCT CARDS</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 25px;
        }

        h1{
            text-align: center;
        }

        .container{
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .card{
            width: 500px;
            background-color: rgba(194, 194, 194, 0.782);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0px 2px 5px gray;
        }

        .card:hover{
            transform: scale(1.03);
        }

        img{
            width: 100%;
            height: 250px;
            border-radius: 10px;
        }

        .price{
            color: black;
            font-weight: bold;
        }

        button{
            background-color: rgb(15, 16, 15);
            color: white;
            border: none;
            padding: 10px 100px;
            border-radius: 100px;
            cursor: pointer;
        }

        button:hover{
            background-color: rgb(105, 97, 97);
        }
    </style>
</head>

<body>

    <h1>PRODUCT STORE</h1>

    <div class="container">

        <div class="card">
            <img src="https://thf.bing.com/th/id/OIP.xQ8sRDNuvt3TmOtlELXBeQHaHa?w=208&h=208&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Shoes">
            <h3>Shoes</h3>
            <p class="price">₹999</p>
            <button>Buy Now OR Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://thf.bing.com/th/id/OIP.W3M9F8MrUqXtLzXmDGbsWQHaEK?w=269&h=180&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Watch">
            <h3>Watch</h3>
            <p class="price">₹25000</p>
            <button>Buy Now OR Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://tse3.mm.bing.net/th/id/OIP.7r2kU9jW168fyTZSeczuvgHaHa?cb=thfc1falcon2&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Mobile">
            <h3>Mobile</h3>
            <p class="price">₹2,50,000</p>
            <button>Buy Now OR Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://thf.bing.com/th/id/OIP.44ciNE8XxJXm84XpFy4NggHaLd?w=130&h=202&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Headphones">
            <h3>Headphones</h3>
            <p class="price">₹1,999</p>
            <button>Buy Now OR Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://cdn.mos.cms.futurecdn.net/263d7508d9b9a324745c63f6545e514c-1920-80.jpg" alt="Camera">
            <h3>Camera</h3>
            <p class="price">₹24,999</p>
            <button>Buy Now OR Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://thf.bing.com/th/id/OIP.lrCa7VhJpAaL9WMKDlzY2wHaHa?w=177&h=188&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Bag">
            <h3>Bag</h3>
            <p class="price">₹799</p>
            <button>Buy Now OR Add to Cart</button>
        </div>

    </div>

</body>
</html>
